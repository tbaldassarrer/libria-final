<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIBRIA - Registro</title>

  <!-- Bootstrap & MDBootstrap -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.0/mdb.min.css" rel="stylesheet">

  <!-- Archivo CSS personalizado -->
  <link rel="stylesheet" href="/styles/login.css">
</head>
<body>
  <div class="background-image-container"></div>

  <div class="overlay-container">
    <div class="container px-4 py-5 px-md-5">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="card bg-glass">
            <div class="card-body px-4 py-5 px-md-5">
              <h2 class="text-center mb-4">Registro en LIBRIA</h2>

              <!-- Mensaje de error en el registro -->
              <div th:if="${registerError}" class="alert alert-danger">
                <strong th:text="${registerError}"></strong>
              </div>

              <!-- Mensaje de éxito en el registro -->
              <div th:if="${registerSuccess}" class="alert alert-success">
                <strong th:text="${registerSuccess}"></strong>
              </div>

              <!-- Formulario de Registro -->
              <form th:action="@{/register}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-outline mb-4">
                  <input type="text" id="nombreUsuario" name="nombreUsuario" class="form-control" th:value="${nombreUsuario}" required />
                  <label class="form-label" for="nombreUsuario">Nombre de Usuario</label>
                </div>

                <div class="form-outline mb-4">
                  <input type="email" id="email" name="email" class="form-control" th:value="${email}" required />
                  <label class="form-label" for="email">Correo Electrónico</label>
                </div>

                <div class="form-outline mb-4">
                  <input type="password" id="password" name="password" class="form-control" required />
                  <label class="form-label" for="password">Contraseña</label>
                  <small class="form-text text-muted">Mínimo 6 caracteres, una letra, un número y un carácter especial.</small>
                </div>

                <div class="form-outline mb-4">
                  <input type="password" id="reppassword" name="reppassword" class="form-control" required />
                  <label class="form-label" for="reppassword">Repetir Contraseña</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block mb-4">
                  Registrarse
                </button>
              </form>

              <div class="text-center">
                <p>¿Ya tienes una cuenta? <a href="/login">Inicia sesión</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.0/mdb.min.js"></script>
</body>
</html>
