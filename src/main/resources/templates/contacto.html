<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  <title>Cont&aacute;ctanos</title>
    <link rel="stylesheet" href="styles/contacto.css?v=9" />
  <link rel="stylesheet" href="styles/navbar.css?v=2" />
  <link rel="stylesheet" href="styles/book-popup.css?v=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<body>
    <div th:replace="~{fragments/navbar :: siteNavbar}"></div>
    <div th:replace="~{fragments/book-popup :: bookPopup}"></div>
  <main class="contact-page">
    <div class="contact-container">
      <h1>Cont&aacute;ctanos</h1>
      <form id="contactForm">
        <label for="name">Nombre:</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Correo electr&oacute;nico:</label>
        <input type="email" id="email" name="email" required />

        <label for="message">Mensaje:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Enviar</button>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p class="site-footer__copy">&copy; 2026 Libria. Todos los derechos reservados.</p>
      <div class="site-footer__socials" aria-label="Redes sociales">
        <span class="footer-social" aria-label="Instagram" role="img">
          <i class="fab fa-instagram"></i>
        </span>
        <span class="footer-social" aria-label="Twitter" role="img">
          <i class="fab fa-twitter"></i>
        </span>
        <span class="footer-social" aria-label="Facebook" role="img">
          <i class="fab fa-facebook-f"></i>
        </span>
        <a class="footer-social" th:href="@{/contacto}" aria-label="Ir a contacto por email">
          <i class="fa-solid fa-envelope"></i>
        </a>
      </div>
      <p class="site-footer__creators">Creadoras: Tatiana Baldassarre y Yesenia Rosales</p>
    </div>
  </footer>

  <script src="js/navbar.js?v=2"></script>
  <script src="js/book.js?v=12"></script>
  <script src="js/reading.js?v=11"></script>
  <script src="js/contacto.js"></script>
</body>
</html>
